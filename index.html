<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Conferência</title>
    <style>
        body { font-family: Arial; background: #1e3c72; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; max-width: 1000px; margin: 0 auto; }
        button { background: #1e3c72; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .drop-area { border: 2px dashed #1e3c72; padding: 30px; text-align: center; margin: 10px 0; cursor: pointer; background: #f8f9fa; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .ok { background: #c6f6d5; padding: 10px; margin: 5px 0; border-left: 4px solid #48bb78; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 150px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        h2 { margin-top: 0; }
        .nota-card { border-left: 3px solid #1e3c72; padding: 10px; margin: 5px 0; background: #f0f0f0; }
        .ean-item { display: inline-block; background: #1e3c72; color: white; padding: 5px 8px; margin: 3px; border-radius: 3px; font-size: 11px; cursor: pointer; }
        .progress-bar { background: #ddd; border-radius: 10px; height: 20px; overflow: hidden; margin: 10px 0; }
        .progress-fill { background: #48bb78; height: 100%; width: 0%; }
    </style>
</head>
<body>
<div class="card">
    <h2>📦 CONFERÊNCIA</h2>
    <div class="form-row">
        <div class="form-group"><label>Data:</label><input type="date" id="data"></div>
        <div class="form-group"><label>Lacre:</label><input type="text" id="lacre"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Loja:</label><input type="text" id="lojaNum"></div>
        <div class="form-group"><label>Nome Loja:</label><input type="text" id="lojaNome"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Operador:</label><input type="text" id="operador"></div>
        <div class="form-group"><label>Placa:</label><input type="text" id="placa"></div>
    </div>
    <button id="iniciarBtn">INICIAR</button>
</div>

<div id="conferenciaArea" style="display:none;">
    <div class="card">
        <div id="dropArea" class="drop-area">ARRASTE O ZIP OU EXCEL AQUI</div>
        <div id="statusMsg"></div>
    </div>
    <div class="card"><div id="resumoDiv"></div></div>
    <div class="card">
        <input type="text" id="scannerInput" placeholder="Escaneie o EAN" autofocus>
        <div id="scanResultDiv"></div>
    </div>
    <div class="card">
        <div class="progress-bar"><div id="progressoBar" class="progress-fill"></div></div>
        <div id="progressoTexto"></div>
        <div id="notasDiv"></div>
    </div>
    <div class="card">
        <button id="relatorioBtn">RELATÓRIO</button>
        <button id="encerrarBtn">ENCERRAR</button>
    </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let dados = { notas: [] };

document.getElementById('iniciarBtn').onclick = function() {
    dados = {
        data: document.getElementById('data').value,
        lacre: document.getElementById('lacre').value,
        lojaNum: document.getElementById('lojaNum').value,
        lojaNome: document.getElementById('lojaNome').value,
        operador: document.getElementById('operador').value,
        placa: document.getElementById('placa').value || 'N/A',
        notas: []
    };
    document.querySelector('.card').style.display = 'none';
    document.getElementById('conferenciaArea').style.display = 'block';
};

function extrairDadosExcel(data, fileName) {
    let workbook = XLSX.read(data, { type: 'array' });
    let primeiraPlanilha = workbook.Sheets[workbook.SheetNames[0]];
    let linhas = XLSX.utils.sheet_to_json(primeiraPlanilha, { header: 1, defval: "" });
    
    let nfe = '';
    let itens = [];
    let eansMap = new Map();
    
    if (linhas[0] && linhas[0][3]) nfe = String(linhas[0][3]);
    if (!nfe) nfe = 'NFE_' + Date.now();
    
    for (let i = 1; i < linhas.length; i++) {
        let linha = linhas[i];
        if (!linha || linha.length < 8) continue;
        
        let ean = linha[3] ? String(linha[3]).trim() : '';
        let qtd = 0;
        if (linha[7]) qtd = parseFloat(String(linha[7]).replace(',', '.')) || 0;
        
        let valorTotal = 0;
        if (linha[11]) valorTotal = parseFloat(String(linha[11]).replace(',', '.')) || 0;
        
        let custoUnitario = qtd > 0 ? valorTotal / qtd : 0;
        
        if (ean && ean !== 'SEM GTIN' && ean.length >= 10 && qtd > 0 && !eansMap.has(ean)) {
            eansMap.set(ean, {
                ean: ean,
                codigo: linha[0] ? String(linha[0]).trim() : '',
                desc: linha[1] ? String(linha[1]).trim().substring(0, 50) : '',
                qtd: qtd,
                custo: custoUnitario,
                valorTotal: valorTotal,
                conf: 0
            });
        }
    }
    
    return { nfe: nfe, itens: Array.from(eansMap.values()), fileName: fileName };
}

let dropArea = document.getElementById('dropArea');
dropArea.ondragover = (e) => e.preventDefault();
dropArea.ondrop = async (e) => {
    e.preventDefault();
    let file = e.dataTransfer.files[0];
    if (!file) return;
    
    let extensao = file.name.split('.').pop().toLowerCase();
    let notas = [];
    
    if (extensao === 'zip') {
        let zip = await JSZip.loadAsync(await file.arrayBuffer());
        for (let [nome, arquivo] of Object.entries(zip.files)) {
            if (!arquivo.dir && (nome.endsWith('.xls') || nome.endsWith('.xlsx'))) {
                let dadosArquivo = await arquivo.async('arraybuffer');
                let nota = extrairDadosExcel(dadosArquivo, nome);
                if (nota.itens.length) notas.push(nota);
            }
        }
    } else if (['xls', 'xlsx'].includes(extensao)) {
        let nota = extrairDadosExcel(await file.arrayBuffer(), file.name);
        if (nota.itens.length) notas.push(nota);
    }
    
    if (notas.length === 0) {
        document.getElementById('statusMsg').innerHTML = '<div class="ok">Nenhum item encontrado!</div>';
        return;
    }
    
    dados.notas = notas;
    document.getElementById('statusMsg').innerHTML = '<div class="ok">' + notas.length + ' nota(s) carregadas!</div>';
    atualizarTudo();
};

function atualizarTudo() {
    let totalGeral = 0, confGeral = 0;
    let notasDiv = document.getElementById('notasDiv');
    notasDiv.innerHTML = '';
    
    for (let nota of dados.notas) {
        let total = 0, conf = 0, valorNota = 0;
        for (let item of nota.itens) {
            total += item.qtd;
            conf += Math.min(item.conf, item.qtd);
            valorNota += item.valorTotal;
        }
        totalGeral += total;
        confGeral += conf;
        let pct = total > 0 ? (conf / total) * 100 : 0;
        
        let eansHtml = '';
        for (let item of nota.itens) {
            eansHtml += '<span class="ean-item" onclick="copiarEAN(\'' + item.ean + '\')">' + item.ean + '</span>';
        }
        
        notasDiv.innerHTML += '<div class="nota-card">' +
            '<strong>NFe: ' + nota.nfe + '</strong> | Valor: R$ ' + valorNota.toFixed(2) + '<br>' +
            'Itens: ' + conf + '/' + total + ' (' + pct.toFixed(0) + '%)<br>' +
            '<div class="progress-bar" style="height:6px;"><div style="background:#48bb78; width:' + pct + '%; height:6px;"></div></div>' +
            '<div>EANs: ' + eansHtml + '</div></div>';
    }
    
    let pctGeral = totalGeral > 0 ? (confGeral / totalGeral) * 100 : 0;
    document.getElementById('progressoBar').style.width = pctGeral + '%';
    document.getElementById('progressoTexto').innerHTML = pctGeral.toFixed(1) + '% (' + confGeral + '/' + totalGeral + ')';
    document.getElementById('resumoDiv').innerHTML = '<div class="ok">Notas: ' + dados.notas.length + ' | Itens: ' + totalGeral + '</div>';
}

function copiarEAN(ean) {
    document.getElementById('scannerInput').value = ean;
    document.getElementById('scannerInput').focus();
}

let scanner = document.getElementById('scannerInput');
scanner.onkeypress = function(e) {
    if (e.key === 'Enter') {
        let cod = scanner.value.trim();
        if (!cod) return;
        
        let achou = false;
        for (let nota of dados.notas) {
            for (let item of nota.itens) {
                if (item.ean === cod) {
                    item.conf++;
                    achou = true;
                    let msg = item.conf === item.qtd ? 'CONFERIDO' : (item.conf > item.qtd ? 'SOBRA' : 'PARCIAL');
                    document.getElementById('scanResultDiv').innerHTML = '<div class="ok">' + item.desc + '<br>' + item.conf + '/' + item.qtd + ' - ' + msg + '</div>';
                    setTimeout(() => document.getElementById('scanResultDiv').innerHTML = '', 2000);
                    atualizarTudo();
                    break;
                }
            }
            if (achou) break;
        }
        if (!achou) {
            document.getElementById('scanResultDiv').innerHTML = '<div class="ok" style="background:#fed7d7;">Codigo ' + cod + ' nao encontrado!</div>';
            setTimeout(() => document.getElementById('scanResultDiv').innerHTML = '', 2000);
        }
        scanner.value = '';
        scanner.focus();
    }
};

document.getElementById('relatorioBtn').onclick = function() {
    let html = '<h2>RELATORIO DE DIVERGENCIAS</h2><hr>' +
        '<p>Data: ' + dados.data + ' | Lacre: ' + dados.lacre + '</p>' +
        '<p>Loja: ' + dados.lojaNum + ' - ' + dados.lojaNome + '</p>' +
        '<p>Operador: ' + dados.operador + ' | Placa: ' + dados.placa + '</p><hr>';
    
    let divergencias = [];
    for (let nota of dados.notas) {
        for (let item of nota.itens) {
            let diff = item.conf - item.qtd;
            if (diff !== 0) {
                divergencias.push({
                    nfe: nota.nfe, codigo: item.codigo, ean: item.ean, desc: item.desc,
                    qtdNota: item.qtd, qtdConf: item.conf, diff: diff,
                    tipo: diff < 0 ? 'FALTA' : 'SOBRA',
                    prejuizo: Math.abs(diff) * (item.valorTotal / item.qtd)
                });
            }
        }
    }
    
    if (divergencias.length === 0) {
        html += '<div style="text-align:center; padding:20px;">NENHUMA DIVERGENCIA ENCONTRADA!</div>';
    } else {
        html += '<table border="1"><tr><th>NFe</th><th>Codigo</th><th>EAN</th><th>Descricao</th><th>Nota</th><th>Conf</th><th>Dif</th><th>Tipo</th><th>Prejuizo</th></tr>';
        for (let d of divergencias) {
            html += '<tr><td>' + d.nfe + '</td><td>' + d.codigo + '</td><td>' + d.ean + '</td><td>' + d.desc + '</td>' +
                '<td>' + d.qtdNota + '</td><td>' + d.qtdConf + '</td><td>' + Math.abs(d.diff) + '</td><td>' + d.tipo + '</td><td>R$ ' + d.prejuizo.toFixed(2) + '</td></tr>';
        }
        html += '</table>';
    }
    
    let win = window.open('', '_blank');
    win.document.write('<html><head><title>Relatorio</title><style>body{font-family:Arial;margin:20px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:8px}th{background:#1e3c72;color:white}</style></head><body>' + html + '<script>window.onload=function(){window.print()}<\/script></body></html>');
    win.document.close();
};

document.getElementById('encerrarBtn').onclick = function() {
    if (confirm('Encerrar carga?')) location.reload();
};
</script>
</body>
</html>
